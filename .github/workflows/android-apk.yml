name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Create local properties
        shell: bash
        run: |
          {
            echo "sdk.dir=${ANDROID_HOME}"
            echo "SUPABASE_URL=${{ vars.SUPABASE_URL || 'https://zfvntgvrqrdpotdihkhy.supabase.co' }}"
            echo "SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_eJpKKou4Jv49W9pyDgM00g_ZiVS4JJH' }}"
          } > local.properties

      - name: Build debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: college-canteen-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
