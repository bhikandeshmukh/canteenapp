name: Build Release Android App

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-release:
    name: Build signed release APK and AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Create local properties
        shell: bash
        run: |
          {
            echo "sdk.dir=${ANDROID_HOME}"
            echo "SUPABASE_URL=${{ vars.SUPABASE_URL || 'https://zfvntgvrqrdpotdihkhy.supabase.co' }}"
            echo "SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_eJpKKou4Jv49W9pyDgM00g_ZiVS4JJH' }}"
          } > local.properties

      - name: Configure release signing
        shell: bash
        run: |
          mkdir -p keystore
          if [ -n "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > keystore/release.p12
            {
              echo "RELEASE_STORE_FILE=keystore/release.p12"
              echo "RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}"
              echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}"
              echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}"
            } >> local.properties
          else
            keytool -genkeypair -storetype PKCS12 -keystore keystore/ci-release.p12 \
              -storepass ci-release-password -keypass ci-release-password \
              -alias canteenapp -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=College Canteen, OU=Android, O=Canteen App, L=India, ST=India, C=IN"
            {
              echo "RELEASE_STORE_FILE=keystore/ci-release.p12"
              echo "RELEASE_STORE_PASSWORD=ci-release-password"
              echo "RELEASE_KEY_ALIAS=canteenapp"
              echo "RELEASE_KEY_PASSWORD=ci-release-password"
            } >> local.properties
          fi

      - name: Build signed release app
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease bundleRelease --stacktrace

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: college-canteen-release
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
